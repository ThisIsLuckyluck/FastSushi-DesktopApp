<!doctype html>
<html>
<head>
    <meta charset="UTF-8" />
    <title>Paramètres | FastSushi</title>
    <link rel="stylesheet" href="./../style/global.css"/>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f9f9f9;
            margin: 0;
            padding: 0;
        }
        nav {
            background-color: #333;
            color: white;
            padding: 10px;
        }
        nav a {
            color: white;
            text-decoration: none;
            margin-right: 15px;
        }
        .logo-link {
            display: flex;
            align-items: center;
        }
        .logo-link img {
            height: 40px;
            margin-right: 10px;
        }
        main {
            padding: 20px;
        }
        .settings-container {
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .settings-item {
            margin-bottom: 15px;
        }
        .settings-item label {
            font-weight: bold;
        }
    </style>
</head>
<body>
    <nav>
        <div class="FastSushi">
            <a href="./index.html" class="logo-link">
                <div class="image-sushi">
                    <img src="./../../assets/logo_blanc.png"/>
                </div>
                <h2>
                    <span class="Fast">Fast</span><span class="Sushi">Sushi</span>
                </h2>
            </a>
        </div>
        <ul>
            <li><a href="./user.html">Liste Client</a></li>
            <li><a href="./menus.html">Gestion des produits</a></li>
            <li><a href="./settings.html">Paramètres</a></li>
        </ul>
        <button id="logout">Quitter l'application</button>
    </nav>
    <main>
        <h1>Paramètres de l'Application</h1>
        <div class="settings-container">
            <div class="settings-item">
                <label for="app-version">Version de l'application:</label>
                <span id="app-version">1.0.0</span>
            </div>
            <div class="settings-item">
                <label for="last-update">Dernière mise à jour:</label>
                <span id="last-update">10 Juin 2024</span>
            </div>
            <div class="settings-item">
                <label for="current-time">Heure actuelle:</label>
                <span id="current-time"></span>
            </div>
            <div class="settings-item">
                <label for="user-info">Utilisateur connecté:</label>
                <span id="user-info"></span>
            </div>
        </div>
    </main>
    <script type="module" src="./settings.js"></script>
</body>
<script>
  // Fonction pour récupérer les informations de l'utilisateur connecté
function getUserInfo() {
    const username = sessionStorage.getItem('username');
    return username ? username : 'Non connecté';
}

// Fonction pour initialiser les paramètres de l'application
function initSettings() {
    document.getElementById('app-version').textContent = '1.0.0'; // Version de l'application
    document.getElementById('last-update').textContent = '10 Juin 2024'; // Date de la dernière mise à jour
    document.getElementById('user-info').textContent = getUserInfo(); // Utilisateur connecté
    updateCurrentTime(); // Mettre à jour l'heure actuelle
}

// Fonction pour mettre à jour l'heure actuelle
function updateCurrentTime() {
    const now = new Date();
    const currentTime = now.toLocaleTimeString();
    document.getElementById('current-time').textContent = currentTime;
}

// Mettre à jour l'heure actuelle toutes les secondes
setInterval(updateCurrentTime, 1000);

// Initialiser les paramètres lorsque la page est chargée
window.onload = initSettings;

</script>
</html>
