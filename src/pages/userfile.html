<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Utilisateur | FastSushi</title>
    <link rel="stylesheet" href="./../style/global.css"/>
    <script type="module" src="./index.js"></script>
    <script type="module" src="../utils/UpdateUser.js"></script>
    <script type="module" src="../utils/DeleteUser.js"></script>
    <script type="module" src="../utils/Post_userid.js"></script>
  </head>
  <body>
    <nav>
      <div class="FastSushi">
        <a href="./index.html" class="logo-link"></a>
          <div class="image-sushi">
            <img src="./../../assets/logo_blanc.png"/>
          </div>
          <h2>
            <span class="Fast">Fast</span><span class="Sushi">Sushi</span>
          </h2>
      </div>
      <ul>
        <li><a href="./user.html">Liste Client</a></li>
        <li><a href="./menus.html">Gestion des produits</a></li>
        <li><a href="./settings.html">Paramètres</a></li>
      </ul>
      <button id="logout" >Quitter l'application</button>
    </nav>

    <main class="container">
      <div class="content" id="client-details">
        <h1 class="mt-4">Détails du Client</h1>
        <div id="client-details-content">
          <form>
            <div class="mb-3">
              <label for="client-id" class="form-label"><strong>Id:</strong></label>
              <input type="text" class="form-control" id="client-id" readonly>
            </div>
            <div class="row mb-3">
              <div class="col">
                <label for="client-last-name" class="form-label"><strong>Nom:</strong></label>
                <input type="text" class="form-control" id="client-last-name">
              </div>
              <div class="col">
                <label for="client-first-name" class="form-label"><strong>Prénom:</strong></label>
                <input type="text" class="form-control" id="client-first-name">
              </div>
            </div>
            <div class="mb-3">
              <label for="client-email" class="form-label"><strong>Email:</strong></label>
              <input type="email" class="form-control" id="client-email">
            </div>
            <div class="mb-3">
              <label for="client-tel" class="form-label"><strong>Téléphone:</strong></label>
              <input type="tel" class="form-control" id="client-tel">
            </div>
            <div class="mb-3">
              <label for="client-permission" class="form-label"><strong>Permission:</strong></label>
              <input type="text" class="form-control" id="client-permission">
            </div>
            <div class="mb-3">
              <label for="client-username" class="form-label"><strong>Nom d'utilisateur:</strong></label>
              <input type="text" class="form-control" id="client-username">
            </div>
         
          <!-----------------------------BOUTON----------------------------->
          <form id="updateUserForm">
            <button type="submit" class="button-24">Mise à jour</button>
            <button type="button" class="button-25">Supprimer l'utilisateur</button>
          </form>
        </div>
      </div>
    </main>
  </body>
</html>
