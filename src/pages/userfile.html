<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Utilisateur | FastSushi</title>
    <link rel="stylesheet" href="./../style/global.css"/>
    <script type="module" src="./index.js"></script>
    <script type="module" src="../utils/Get_Client.js"></script>
    <script type="module" src="../utils/input.js"></script>
    
  </head>
  <body>
    <nav>
      <div class="FastSushi">
        <a href="./index.html" class="logo-link">
          <div class="image-sushi">
            <img src="./../../assets/logo_blanc.png"/>
          </div>
          <h2>
            <span class="Fast">Fast</span><span class="Sushi">Sushi</span>
          </h2>
        </a>
      </div>
      <ul>
        <li><a href="./user.html">Liste Client</a></li>
        <li><a href="./menus.html">Gestion des produits</a></li>
        <li><a href="./settings.html">Paramètres</a></li>
      </ul>

      <button id="logout" >Quitter l'application</button>
    </nav>
    <main id="app">
      <div class="content">
        <!-- Fiche client -->
  <div class="content" id="client-details">
    <h1>Détails du Client</h1>
    <!-- Contenu des détails du client -->
    <div id="client-details-content">
      <p><strong>Id:</strong> <span id="client-id"></span></p>
      <p><strong>Nom:</strong> <span id="client-last-name" contenteditable="true"></span></p>
      <p><strong>Prénom:</strong> <span id="client-first-name" contenteditable="true"></span></p>
      <p><strong>Email:</strong> <span id="client-email" contenteditable="true"></span></p>
      <p><strong>Téléphone:</strong> <span id="client-tel" contenteditable="true"></span></p>
      <p><strong>Permission:</strong> <span id="client-permission" contenteditable="true"></span></p>
      <p><strong>Nom d'utilisateur:</strong> <span id="client-username" contenteditable="true"></span></p>

      <!-- Boutons d'action -->
      <button id="delete">Supprimer</button>
      <button id="update">Update</button>
    </div>
  </div>

  <!-- Script JavaScript -->
  <script>
    
    // Lorsque le contenu de la page est chargé
    document.addEventListener('DOMContentLoaded', async function () {
        const urlParams = new URLSearchParams(window.location.search);
        const clientId = urlParams.get('id');

        try {
            // Récupérer le token d'authentification depuis le localStorage
            const token = sessionStorage.getItem('token');
            if (!token) {
                throw new Error('Token not found in sessionStorage.');
            }

            // Effectuer une requête pour récupérer les données du client
            const response = await fetch('http://185.255.112.208:3000/user/id', {
                method: 'POST',
                headers: {
                    'Accept': 'application/json',
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + token,
                },
                body: JSON.stringify({ id_user: clientId }) // inclure l'ID du client dans le corps de la requête
            });

            if (!response.ok) {
                throw new Error('Erreur lors de la récupération des données du client');
            }

            // Analyser la réponse JSON
            const clientData = await response.json();

            // Afficher les détails du client
            displayClientDetails(clientData[0]);
            console.log(clientData)

        } catch (error) {
            console.error('Error:', error);
        }
    });

    // Fonction pour afficher les détails du client
    function displayClientDetails(clientData) {
        // Récupérer l'élément parent pour les détails du client
        const clientDetailsDiv = document.getElementById('client-details-content');
        if (!clientDetailsDiv) {
            console.error("L'élément avec l'ID 'client-details-content' n'a pas été trouvé.");
            return;
        }

        // Mettre à jour les éléments HTML avec les données du client
        document.getElementById('client-id').textContent = clientData.id_user;console.log(clientData.id_user)
        document.getElementById('client-last-name').textContent = clientData.last_name;console.log(clientData.last_name);
        document.getElementById('client-first-name').textContent = clientData.first_name;console.log(clientData.first_name);
        document.getElementById('client-email').textContent = clientData.email;console.log(clientData.email);
        document.getElementById('client-tel').textContent = clientData.tel;console.log(clientData.tel);
        document.getElementById('client-permission').textContent = clientData.permission;console.log(clientData.permission);
        document.getElementById('client-username').textContent = clientData.username;console.log(clientData.username);
    }
  </script>
      </div>
    </main>
  </body>
</html>
