<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Liste des entrées | FastSushi</title>
    <link rel="stylesheet" href="./../style/global.css"/>
    <script type="module" src="./index.js"></script>
    <script type="module" src="../utils/Get_appetizer.js"></script>
    <script type="module" src="../utils/input.js"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
  </head>
  <body>
    <nav>
      <div class="FastSushi">
        <a href="./index.html" class="logo-link">
          <div class="image-sushi">
            <img src="./../../assets/logo_blanc.png"/>
          </div>
          <h2>
            <span class="Fast">Fast</span><span class="Sushi">Sushi</span>
          </h2>
        </a>
      </div>
      <ul>
        <li><a href="./user.html">Liste Client</a></li>
        <li><a href="./menus.html">Gestion des produits</a></li>
        <li><a href="./settings.html">Paramètres</a></li>
      </ul>

      <button id="logout">Quitter l'application</button>
    </nav>
    <main id="app">
      <div class="content">
        <h1>Gestions des entrées</h1>
        <br>
        <input type="search" id="searchInput" placeholder="rechercher un produit">
        <a href="./appetizerCreate.html" id="add_appetizer">Ajouter une entrée</a>
        <table id="appetizer-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Type</th>
              <th>Nom</th>
              <th>Description</th>
              <th>Prix (en €)</th>
              <th>Quantité (en unité)</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="appetizer-list"></tbody>
        </table>
      </div>
    </main>
  </body>
</html>
