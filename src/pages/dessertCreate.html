<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ajouter un dessert</title>
  <link rel="stylesheet" href="./../style/global.css"/>
  <script type="module" src="./index.js"></script>
</head>

<body>
  <nav>
    <div class="FastSushi">
      <a href="./index.html" class="logo-link">
        <div class="image-sushi">
          <img src="./../../assets/logo_blanc.png"/>
        </div>
        <h2>
          <span class="Fast">Fast</span><span class="Sushi">Sushi</span>
        </h2>
      </a>
    </div>
    <ul>
      <li><a href="./user.html">Liste Client</a></li>
      <li><a href="./menus.html">Gestion des produits</a></li>
      <li><a href="./settings.html">Paramètres</a></li>
    </ul>

    <button id="logout">Quitter l'application</button>
  </nav>
  <div class="container mt-5">
    <h2 id="titre">Ajout d'un dessert</h2>
    <form id="createProduct" typeof="Form">
      <div class="form-group">
        <label for="type_product">Type de produit :</label>
        <select id="type_product" name="type_product">
          <option value="dessert">dessert</option>
        </select>
      </div>
      <div class="form-group">
        <label for="product_name">Nom du dessert</label>
        <input id="product_name"></input>
      </div>
      <div class="form-group">
        <label for="description">Description du dessert :</label>
        <input type="text" id="description">
      </div>
      <div class="form-group">
        <label for="price">Prix (unitaire) :</label>
        <input type="text" id="price">
      </div>
      <div class="form-group">
        <label for="quantity">Quantité disponible :</label>
        <input type="text" id="quantity">
      </div>
      <button type="button"><a href="./appetizer.html" id="cancel">Annuler</a></button>
      <button type="submit" id="validate">Créer l'entrée</button>
    </form>
  </div>

  <script type="module">
    import { createProduct } from "../utils/CreateProduct.js";

    document.getElementById('createProduct').addEventListener('submit', async function (event) {
      event.preventDefault(); // Prevent page reload

      const type_product = document.getElementById('type_product').value;
      const product_name = document.getElementById('product_name').value;
      const description = document.getElementById('description').value;
      const price = document.getElementById('price').value;
      const quantity = document.getElementById('quantity').value;

      const response = createProduct(type_product, product_name, description, price, quantity);

      alert("dessert crée")

    });

  </script>

</body>

</html>
