<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Utilisateur | FastSushi</title>
    <link rel="stylesheet" href="./../style/global.css"/>
    <script type="module" src="./index.js"></script>
    <script type="module" src="../utils/DeleteProduct.js"></script>
  </head>
  <body>
    <nav>
      <div class="FastSushi">
        <a href="./index.html" class="logo-link"></a>
          <div class="image-sushi">
            <img src="./../../assets/logo_blanc.png"/>
          </div>
          <h2>
            <span class="Fast">Fast</span><span class="Sushi">Sushi</span>
          </h2>
      </div>
      <ul>
        <li><a href="./user.html">Liste Client</a></li>
        <li><a href="./menus.html">Gestion des produits</a></li>
        <li><a href="./settings.html">Paramètres</a></li>
      </ul>
      <button id="logout" >Quitter l'application</button>
    </nav>

    <main class="container">
      <div class="content" id="appetizer-details">
        <h1 class="mt-4">Détails de l'entrée</h1>
        <div id="appetizer-details-content">
            <form id="deleteAppetizer">
                <div class="form-group">
                    <label for="type_product">Choisissez le type du produit :</label>
                    <select id="type_product" name="type_product">
                      <option value="appetizer">entrée</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="product_name">product_name :</label>
                    <input type="text" class="form-control" id="product_name">
                  </div>
                  <div class="form-group">
                    <label for="description">description :</label>
                    <input type="text" class="form-control" id="description">
                  </div>
                  <div class="form-group">
                    <label for="price">price :</label>
                    <input type="text" class="form-control" id="price">
                  </div>
                  <div class="form-group">
                    <label for="quantity">quantity :</label>
                    <input type="text" class="form-control" id="quantity">
                  </div>
                <!-----------------------------BOUTON----------------------------->
                <button type="button"><a href="./appetizer.html" id="cancel">Annuler</a></button>
                <button type="submit" id="validate">Supprimer l'entrée</button>
              </form>
        </div>
      </div>
    </main>
  </body>
</html>
