<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Utilisateur | FastSushi</title>
    <link rel="stylesheet" href="./../style/global.css"/>
    <script type="module" src="./index.js"></script>
    <script type="module" src="../utils/Get_Client.js"></script>
  </head>
  <body>
    <nav>
      <div class="FastSushi">
        <a href="./index.html" class="logo-link">
          <div class="image-sushi">
            <img src="./../../assets/logo_blanc.png"/>
          </div>
          <h2>
            <span class="Fast">Fast</span><span class="Sushi">Sushi</span>
          </h2>
        </a>
      </div>
      <ul>
        <li><a href="./user.html">Liste Client</a></li>
        <li><a href="./menus.html">Gestion des produits</a></li>
        <li><a href="./settings.html">Paramètres</a></li>
      </ul>

      <button id="logout" >Quitter l'application</button>
    </nav>
    <main id="app">
      <div class="content">
        <h1>Liste des Clients</h1>
        <input type="search" id="searchInput" placeholder="rechercher un client">
        <table id="client-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Nom</th>
              <th>Prénom</th>
              <th>Téléphone</th>
              <th>Email</th>
              <th>Nom d'utilisateur</th>
            </tr>
          </thead>
          <tbody id="client-list"></tbody>
        </table>
      </div>
    </main>
  </body>
</html>
